<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADBA Diseño</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --primary: #7000ff; --bg: #050505; --wa: #25d366; --accent: #00f2fe; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* --- MEJORA INCISO 1: TEXTURA DE FONDO --- */
        body { 
            margin: 0; 
            background: var(--bg); 
            background-image: radial-gradient(circle, rgba(112, 0, 255, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            color: white; 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        /* --- ANIMACIONES --- */
        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.6)); transform: translateY(0); }
            50% { filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.8)); transform: translateY(-5px); }
        }

        .reveal-item { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .reveal-item.reveal { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        .header { padding: 60px 20px 30px; }
        .logo-img { width: 85%; max-width: 300px; animation: logo-glow 5s infinite ease-in-out; }
        .slogan { font-size: 16px; font-style: italic; color: #aaa; margin: 15px 0 25px; }

        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .btn-action {
            padding: 14px 22px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 18px; text-decoration: none; font-size: 11px; font-weight: 800;
            letter-spacing: 1px; backdrop-filter: blur(15px); transition: 0.3s;
        }

        /* --- MEJORA INCISO 3: TÍTULOS NEÓN --- */
        .service-title { 
            font-size: 22px; 
            font-weight: 900; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        /* --- SERVICIOS --- */
        .services-container { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        .service-card { width: 100%; max-width: 350px; cursor: pointer; transition: 0.4s; }
        .image-wrapper { width: 100%; aspect-ratio: 16 / 9; border-radius: 25px; overflow: hidden; border: 2px solid rgba(112, 0, 255, 0.3); background-size: cover; background-position: center; }
        .description { max-height: 0; overflow: hidden; transition: 0.5s ease; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-radius: 0 0 25px 25px; margin-top: -10px; padding: 0 25px; border: 1px solid rgba(255,255,255,0.1); }
        .service-card.active .description { max-height: 500px; padding: 45px 25px 25px; }

        /* --- UBICACIÓN --- */
        #map { height: 300px; width: 350px; border-radius: 35px; border: 3px solid var(--primary); margin: 25px 0; box-shadow: 0 0 30px rgba(112, 0, 255, 0.4); }

        .float-wa { position: fixed; bottom: 35px; right: 25px; z-index: 1000; background: var(--wa); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        footer { padding: 50px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <img src="/img/logo.png" alt="ADBA" class="logo-img">
        <p class="slogan">"Hacemos realidad tus ideas"</p>
        <div class="btn-group">
            <a href="/save-contact" class="btn-action">GUARDAR CONTACTO</a>
            <a href="http://googleusercontent.com/maps.google.com/6" target="_blank" class="btn-action">CÓMO LLEGAR</a>
        </div>
    </div>

    <div class="services-container" id="services-grid"></div>

    <div class="location-section reveal-item">
        <h2 style="font-size: 14px; letter-spacing: 4px; color: var(--primary);">UBICACIÓN</h2>
        <p style="font-size: 13px; opacity: 0.7;">José T. Cuellar 79H, Col. Obrera, 06800 CDMX</p>
        <div id="map"></div>
    </div>

    <a href="https://wa.me/525583938608" class="float-wa"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35"></a>

    <footer>ADBA DISEÑO 2026</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- MAPA SINCRONIZADO CON TUS COORDENADAS DE GOOGLE ---
        const coords = [19.4161, -99.1387]; 
        const map = L.map('map', { zoomControl: false }).setView(coords, 18);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.marker(coords, {
            icon: L.divIcon({
                className: 'm', 
                html: `<div style="background:#7000ff;width:18px;height:18px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 25px #7000ff;"></div>`
            })
        }).addTo(map);

        // Carga de servicios
        fetch('/api/servicios').then(res => res.json()).then(data => {
            const container = document.getElementById('services-grid');
            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card reveal-item';
                card.onclick = () => card.classList.toggle('active');
                card.innerHTML = `
                    <div class="service-title">${s.titulo}</div>
                    <div class="image-wrapper" style="background-image: url('/img/${s.id}.jpg');"></div>
                    <div class="description"><p>${s.resumen}</p></div>
                `;
                container.appendChild(card);
            });
            
            // Observer para animaciones
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('reveal'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
