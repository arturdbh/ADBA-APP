<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADBA Diseño</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <meta property="og:title" content="ADBA Diseño | Hacemos realidad tus ideas">
    <meta property="og:image" content="/img/logo.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --primary: #7000ff; --bg: #050505; --wa: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; overflow-x: hidden; }

        /* --- ANIMACIONES DE RESPLANDOR --- */
        @keyframes neon-pulse {
            0% { filter: drop-shadow(0 0 5px currentColor); text-shadow: 0 0 5px currentColor; }
            50% { filter: drop-shadow(0 0 20px currentColor); text-shadow: 0 0 15px currentColor; }
            100% { filter: drop-shadow(0 0 5px currentColor); text-shadow: 0 0 5px currentColor; }
        }
        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.6)); transform: translateY(0); }
            50% { filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.8)); transform: translateY(-5px); }
        }
        @keyframes wa-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.8); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); transform: scale(1); }
        }

        .reveal-item { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal-item.reveal { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        .header { padding: 60px 20px 30px; display: flex; flex-direction: column; align-items: center; }
        .logo-img { width: 85%; max-width: 300px; animation: logo-glow 5s infinite ease-in-out; }
        .slogan { font-size: 16px; font-style: italic; color: #aaa; margin: 15px 0 25px; }

        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .btn-action {
            padding: 14px 22px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 18px; text-decoration: none; font-size: 11px; font-weight: 800;
            letter-spacing: 1px; backdrop-filter: blur(15px); transition: 0.3s;
        }

        /* --- SERVICIOS --- */
        .services-container { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        .service-card { width: 100%; max-width: 350px; cursor: pointer; }
        .service-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; animation: neon-pulse 3s infinite ease-in-out; }
        .image-wrapper { width: 100%; aspect-ratio: 16 / 9; border-radius: 25px; overflow: hidden; border: 2px solid transparent; transition: 0.6s; background-size: cover; background-position: center; }
        .description { max-height: 0; overflow: hidden; transition: 0.5s ease; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-radius: 0 0 25px 25px; margin-top: -10px; padding: 0 25px; border: 1px solid rgba(255,255,255,0.1); border-top: none; }
        .service-card.active .description { max-height: 500px; padding: 45px 25px 25px; }
        .service-card.active .image-wrapper { border-radius: 25px 25px 0 0; transform: scale(1.03); }

        /* --- CARRUSEL AUTOMÁTICO --- */
        .carousel-title { font-size: 14px; letter-spacing: 4px; color: var(--primary); text-shadow: 0 0 10px var(--primary); margin: 60px 0 20px; }
        .carousel-container { position: relative; width: 100%; max-width: 100vw; overflow: hidden; padding-bottom: 20px; }
        .carousel-track { display: flex; gap: 15px; padding: 0 20px; overflow-x: auto; scroll-behavior: smooth; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carousel-track::-webkit-scrollbar { display: none; }
        .carousel-item { min-width: 300px; aspect-ratio: 16/9; border-radius: 20px; scroll-snap-align: center; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* --- UBICACIÓN --- */
        .location-section { padding: 40px 0 140px; display: flex; flex-direction: column; align-items: center; }
        #map { height: 300px; width: 350px; border-radius: 35px; border: 2px solid var(--primary); margin: 25px 0; box-shadow: 0 0 30px rgba(112, 0, 255, 0.4); }

        .float-wa { position: fixed; bottom: 35px; right: 25px; z-index: 1000; background: var(--wa); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: wa-pulse 2s infinite; }
        footer { padding: 50px; font-size: 11px; color: #444; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="header">
        <img src="/img/logo.png" alt="ADBA" class="logo-img">
        <p class="slogan">"Hacemos realidad tus ideas"</p>
        <div class="btn-group">
            <a href="/save-contact" class="btn-action">GUARDAR CONTACTO</a>
            <a href="https://www.google.com/maps/dir/?api=1&destination=19.4162,-99.1388" target="_blank" class="btn-action">CÓMO LLEGAR</a>
        </div>
    </div>

    <div class="services-container" id="services-grid"></div>

    <h2 class="carousel-title reveal-item">PROYECTOS RECIENTES</h2>
    <div class="carousel-container reveal-item">
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-item" style="background-image: url('/img/p1.jpg')"></div>
            <div class="carousel-item" style="background-image: url('/img/p2.jpg')"></div>
            <div class="carousel-item" style="background-image: url('/img/p3.jpg')"></div>
            <div class="carousel-item" style="background-image: url('/img/p4.jpg')"></div>
            <div class="carousel-item" style="background-image: url('/img/p5.jpg')"></div>
        </div>
    </div>

    <div class="location-section reveal-item">
        <h2 style="font-size: 14px; letter-spacing: 4px; color: var(--primary); text-shadow: 0 0 10px var(--primary);">UBICACIÓN</h2>
        <p style="font-size: 13px; opacity: 0.7; max-width: 320px; line-height: 1.6;">José T. Cuellar 79H, Col. Obrera, 06800 CDMX<br><b>(Vista a Isabel la Católica en Arte Digital)</b></p>
        <div id="map"></div>
    </div>

    <a href="https://wa.me/525583938608" class="float-wa"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35"></a>

    <footer>ADBA DISEÑO 2026</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Mapa
        const map = L.map('map', { zoomControl: false }).setView([19.4162, -99.1388], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.marker([19.4162, -99.1388], {icon: L.divIcon({className: 'm', html: `<div style="background:#7000ff;width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 20px #7000ff;"></div>`})}).addTo(map);

        // Lógica del Carrusel Automático (4 segundos)
        const track = document.getElementById('carouselTrack');
        let index = 0;
        setInterval(() => {
            const items = document.querySelectorAll('.carousel-item');
            index++;
            if (index >= items.length) index = 0;
            const scrollAmount = items[index].offsetLeft - 20; 
            track.scrollTo({ left: scrollAmount, behavior: 'smooth' });
        }, 4000);

        // Observer para efectos de entrada
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, i) => {
                if (entry.isIntersecting) {
                    setTimeout(() => { entry.target.classList.add('reveal'); }, i * 100);
                }
            });
        }, { threshold: 0.1 });

        fetch('/api/servicios').then(res => res.json()).then(data => {
            const container = document.getElementById('services-grid');
            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card reveal-item';
                card.onclick = () => card.classList.toggle('active');
                card.innerHTML = `
                    <div class="service-title" style="color: ${s.color1 || s.color}">${s.titulo}</div>
                    <div class="image-wrapper" style="background-image: url('/img/${s.id}.jpg'); border-color: ${s.color1 || s.color}66; box-shadow: 0 0 25px ${s.color1 || s.color}44;"></div>
                    <div class="description"><p style="font-size: 14px; line-height: 1.7; color: #ccc; text-align: justify;">${s.resumen}</p></div>
                `;
                container.appendChild(card);
                observer.observe(card);
            });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        });

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js'); }); }
    </script>
</body>
</html>
