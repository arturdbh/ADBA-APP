<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ADBA Diseño</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" type="image/png" href="/img/logo.png">
    <link rel="apple-touch-icon" href="/img/logo.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --primary: #7000ff; --bg: #050505; --wa: #25d366; --accent: #00f2fe; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); 
            background-image: radial-gradient(circle, rgba(112, 0, 255, 0.15) 1px, transparent 1px);
            background-size: 30px 30px; background-attachment: fixed;
            color: white; font-family: 'Inter', sans-serif; text-align: center; overflow-x: hidden; 
        }

        /* --- ANIMACIONES --- */
        @keyframes logo-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.6)); transform: translateY(0); }
            50% { filter: drop-shadow(0 0 30px rgba(0, 242, 254, 0.8)); transform: translateY(-5px); }
        }

        @keyframes wa-pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.8); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); transform: scale(1); }
        }

        /* NUEVA ANIMACIÓN: PULSO DE RESPLANDOR PARA FOTOS */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 25px rgba(112, 0, 255, 0.6); border-color: rgba(112, 0, 255, 0.4); }
            50% { box-shadow: 0 0 50px rgba(112, 0, 255, 0.9); border-color: rgba(112, 0, 255, 0.8); }
        }

        .reveal-item { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .reveal-item.reveal { opacity: 1; transform: translateY(0); }

        /* --- HEADER --- */
        .header { padding: 60px 20px 30px; }
        .logo-img { width: 85%; max-width: 300px; animation: logo-glow 5s infinite ease-in-out; }
        .btn-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; }
        .btn-action {
            padding: 14px 22px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 18px; text-decoration: none; font-size: 11px; font-weight: 800;
            letter-spacing: 1px; backdrop-filter: blur(15px); transition: 0.3s; cursor: pointer;
            display: inline-block;
        }

        /* --- SERVICIOS --- */
        .service-title { 
            font-size: 22px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .services-container { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 50px; }
        .service-card { width: 100%; max-width: 350px; cursor: pointer; }
        
        .image-wrapper { 
            width: 100%; aspect-ratio: 16 / 9; border-radius: 25px; overflow: hidden; 
            background-size: cover; background-position: center;
            border: 2px solid rgba(112, 0, 255, 0.6);
            /* APLICACIÓN DEL EFECTO PULSANTE CONTINUO */
            animation: pulse-glow 3s infinite ease-in-out;
            transition: transform 0.5s ease;
        }

        /* EFECTO ZOOM AL PASAR MOUSE/DEDO */
        .service-card:hover .image-wrapper {
            transform: scale(1.05);
            /* Al hacer hover, cancelamos la animación y fijamos un resplandor fuerte */
            animation: none; 
            box-shadow: 0 0 50px var(--primary);
            border-color: var(--accent);
        }

        .description { max-height: 0; overflow: hidden; transition: 0.5s ease; background: rgba(255,255,255,0.04); backdrop-filter: blur(20px); border-radius: 0 0 25px 25px; margin-top: -10px; padding: 0 25px; border: 1px solid rgba(255,255,255,0.1); }
        .service-card.active .description { max-height: 600px; padding: 45px 25px 25px; }

        /* --- UBICACIÓN --- */
        .location-section { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; width: 100%; }
        #map { height: 300px; width: 90%; max-width: 350px; border-radius: 35px; border: 3px solid var(--primary); margin: 20px auto; background: white; }
        .address-text { font-size: 14px; color: var(--accent); font-weight: bold; cursor: pointer; margin-bottom: 10px; text-decoration: underline; }

        /* --- FLOATERS --- */
        .float-wa { position: fixed; bottom: 35px; right: 25px; z-index: 1000; background: var(--wa); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; animation: wa-pulse 2s infinite; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        footer { padding: 50px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <img src="/img/logo.png" alt="ADBA" class="logo-img">
        <p class="slogan">"Hacemos realidad tus ideas"</p>
        <div class="btn-group">
            <a href="/save-contact" class="btn-action">GUARDAR CONTACTO</a>
            <button onclick="irAUbicacion()" class="btn-action" style="background: var(--primary); border: none;">CÓMO LLEGAR</button>
        </div>
    </div>

    <div class="services-container" id="services-grid"></div>

    <div class="location-section reveal-item">
        <h2 style="font-size: 14px; color: var(--primary); letter-spacing: 4px;">UBICACIÓN</h2>
        <div class="address-text" onclick="irAUbicacion()">José T. Cuellar 79H, Col. Obrera, 06800 CDMX</div>
        <div id="map"></div>
    </div>

    <a href="https://wa.me/525583938608" class="float-wa"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35"></a>

    <footer>ADBA DISEÑO 2026</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Coordenadas exactas de Arturo en la Obrera
        const coordsArturo = [19.415068, -99.138576];
        const map = L.map('map', { zoomControl: false }).setView(coordsArturo, 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.marker(coordsArturo, {
            icon: L.divIcon({
                className: 'm', 
                html: `<div style="background:#7000ff;width:20px;height:20px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 25px #7000ff;"></div>`
            })
        }).addTo(map);

        function irAUbicacion() {
            map.flyTo(coordsArturo, 19);
            setTimeout(() => {
                // Enlace corregido a Google Maps
                window.open(`https://www.google.com/maps/dir/?api=1&destination=${coordsArturo[0]},${coordsArturo[1]}`, '_blank');
            }, 1000);
        }

        // Carga de servicios con mensaje personalizado para Arturo
        fetch('/api/servicios').then(res => res.json()).then(data => {
            const container = document.getElementById('services-grid');
            data.forEach(s => {
                const card = document.createElement('div');
                card.className = 'service-card reveal-item';
                
                // Evita que la tarjeta se cierre al dar clic en el botón de WhatsApp
                card.onclick = (e) => {
                    if (e.target.tagName === 'A') return;
                    card.classList.toggle('active');
                };

                card.innerHTML = `
                    <div class="service-title">${s.titulo}</div>
                    <div class="image-wrapper" style="background-image: url('/img/${s.id}.jpg');"></div>
                    <div class="description">
                        <p style="font-size: 14px; color: #ccc; padding: 10px;">${s.resumen}</p>
                        <a href="https://wa.me/525583938608?text=Arturo%20me%20podrías%20hacer%20una%20cotizacion%20de%20${encodeURIComponent(s.titulo)}?" 
                           target="_blank"
                           class="btn-action" 
                           style="display:block; margin-top:15px; background:var(--primary); text-align:center; border:none; text-decoration:none;">
                           COTIZAR ESTO
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('reveal'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
